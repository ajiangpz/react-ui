name: Publish on tag

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.20.0"
          registry-url: "https://registry.npmjs.org/"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm lerna run build --stream

      - name: Clean generated changes
        run: |
          git checkout -- packages/tendaui-icons/src/icons/index.ts

      # 👇 新增：显式写入 .npmrc 到项目根目录
      - name: Configure npm registry and auth token
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > .npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_GITHUB_TOKEN }}

      - name: Verify npm auth
        run: |
          cat .npmrc  # 可选：调试用，确认写入成功（注意不要泄露 token！）
          npm config get registry
          npm whoami

      - name: Publish packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_GITHUB_TOKEN }}
        run: pnpm lerna publish from-package --yes
